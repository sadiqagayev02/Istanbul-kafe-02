<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#36BEFF">
    <title>İstanbul Kafe | Admin Panel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #36BEFF;
            --primary-dark: #1AA0E0;
            --primary-light: #E6F7FF;
            --success: #27AE60;
            --warning: #F39C12;
            --danger: #E74C3C;
            --bg: #FAFEFF;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #36BEFF 0%, #FAFEFF 100%);
            min-height: 100vh;
            color: var(--text);
        }

        /* Login Screen */
        #loginScreen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #36BEFF 0%, #FAFEFF 100%);
            z-index: 9999;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
        }

        .login-logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .login-input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(54, 190, 255, 0.3);
        }

        .login-error {
            color: var(--danger);
            margin-top: 16px;
            font-size: 14px;
        }

        /* Main Panel */
        #mainPanel {
            display: none;
            min-height: 100vh;
        }

        /* Header */
        .admin-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: white;
            border-radius: 50px;
            box-shadow: var(--shadow);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: var(--danger);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Dashboard */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Statistics Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Revenue Section */
        .revenue-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .revenue-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .revenue-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .period-selector {
            display: flex;
            gap: 8px;
        }

        .period-btn {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .period-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .revenue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .revenue-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .revenue-card-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .revenue-card-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--success);
        }

        .revenue-card-detail {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 13px;
        }

        /* Orders Section */
        .orders-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-actions {
            display: flex;
            gap: 12px;
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
        }

        .filter-tab {
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .clear-all-btn {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: var(--danger);
            color: white;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clear-all-btn:hover {
            background: #c0392b;
        }

        /* Orders List */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .order-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }

        .order-card.new {
            background: #E6F7FF;
            border-color: var(--primary);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .order-id {
            font-weight: 700;
            color: var(--primary);
            font-size: 13px;
        }

        .order-time {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .order-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .order-info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .order-info-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .order-info-value {
            font-weight: 600;
            font-size: 13px;
        }

        .order-type-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .type-table { background: var(--primary-light); color: var(--primary-dark); }
        .type-delivery { background: #FEF3C7; color: #D97706; }

        .order-items {
            margin-bottom: 12px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }

        .order-total {
            text-align: right;
            font-weight: 700;
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .delete-order-btn {
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--danger);
            color: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .delete-order-btn:hover {
            background: #c0392b;
        }

        .status-pending { background: #FEF3C7; color: #D97706; }
        .status-preparing { background: #DBEAFE; color: #2563EB; }
        .status-ready { background: #D1FAE5; color: #059669; }
        .status-delivered { background: #E0E7FF; color: #4F46E5; }
        .status-completed { background: #D1FAE5; color: #059669; }
        .status-cancelled { background: #FEE2E2; color: #DC2626; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Notification Toast */
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }

        .toast-message {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 16px;
            animation: toastSlideIn 0.3s ease;
            border-left: 4px solid var(--primary);
        }

        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 20px;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .toast-body {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 12px;
            }
            
            .section-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            
            .revenue-grid {
                grid-template-columns: 1fr;
            }
            
            .order-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-utensils"></i> İstanbul Kafe
            </div>
            <div class="login-subtitle">Admin Panel</div>
            <input type="password" id="secretInput" class="login-input" placeholder="Admin şifrəsi" autofocus>
            <button class="login-btn" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Daxil Ol
            </button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel">
        <!-- Header -->
        <header class="admin-header">
            <div class="header-content">
                <div class="header-title">
                    <i class="fas fa-utensils"></i>
                    İstanbul Kafe Admin
                </div>
                <div class="header-stats">
                    <div class="stat-badge">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="totalOrders">0</span> Sifariş
                    </div>
                    <div class="connection-status">
                        <span class="status-dot" id="connectionStatus"></span>
                        <span id="connectionText">Bağlanır...</span>
                    </div>
                    <button class="stat-badge" onclick="logout()" style="cursor: pointer;">
                        <i class="fas fa-sign-out-alt"></i>
                        Çıxış
                    </button>
                </div>
            </div>
        </header>

        <!-- Dashboard -->
        <div class="dashboard">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Gözləyən</div>
                    <div class="stat-value" id="pendingCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Hazırlanan</div>
                    <div class="stat-value" id="preparingCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Hazır</div>
                    <div class="stat-value" id="readyCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Bu gün</div>
                    <div class="stat-value" id="todayOrders">0</div>
                </div>
            </div>

            <!-- Revenue Section -->
            <div class="revenue-section">
                <div class="revenue-header">
                    <div class="revenue-title">
                        <i class="fas fa-chart-line"></i>
                        Gəlir Statistikası
                    </div>
                    <div class="period-selector">
                        <button class="period-btn active" onclick="changePeriod(1)">1 Gün</button>
                        <button class="period-btn" onclick="changePeriod(3)">3 Gün</button>
                        <button class="period-btn" onclick="changePeriod(7)">7 Gün</button>
                    </div>
                </div>
                <div class="revenue-grid">
                    <div class="revenue-card">
                        <div class="revenue-card-title">Ümumi Gəlir</div>
                        <div class="revenue-card-value" id="totalRevenue">0.00 ₼</div>
                    </div>
                    <div class="revenue-card">
                        <div class="revenue-card-title">Masa Daxili</div>
                        <div class="revenue-card-value" id="tableRevenue">0.00 ₼</div>
                        <div class="revenue-card-detail">
                            <span>Sifariş: <span id="tableOrderCount">0</span></span>
                        </div>
                    </div>
                    <div class="revenue-card">
                        <div class="revenue-card-title">Çatdırılma</div>
                        <div class="revenue-card-value" id="deliveryRevenue">0.00 ₼</div>
                        <div class="revenue-card-detail">
                            <span>Sifariş: <span id="deliveryOrderCount">0</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Orders Section -->
            <div class="orders-section">
                <div class="section-header">
                    <div class="section-title">
                        <i class="fas fa-clipboard-list"></i>
                        Sifarişlər
                    </div>
                    <div class="section-actions">
                        <div class="filter-tabs">
                            <button class="filter-tab active" onclick="filterOrders('all')">Hamısı</button>
                            <button class="filter-tab" onclick="filterOrders('pending')">Gözləyən</button>
                            <button class="filter-tab" onclick="filterOrders('preparing')">Hazırlanan</button>
                            <button class="filter-tab" onclick="filterOrders('ready')">Hazır</button>
                        </div>
                        <button class="clear-all-btn" onclick="clearAllOrders()">
                            <i class="fas fa-trash-alt"></i> Hamısını Sil
                        </button>
                    </div>
                </div>
                <div class="orders-list" id="ordersList">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>Sifariş yoxdur</h3>
                        <p>Yeni sifarişlər burada görünəcək</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast Container -->
    <div class="notification-toast" id="toastContainer"></div>

    <!-- Hidden Audio -->
    <audio id="notificationSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f39/f3+AgICAf39/f39/f39/f3+AgICAf39/f39/f39/f3+AgICAf39/f39/f39/f38=" type="audio/wav">
    </audio>

    <script>
        // ============================================
        // ADMIN PANEL SCRIPT - YENİ VERSİYA
        // ============================================
        
        let ws = null;
        let orders = [];
        let dailyRevenue = JSON.parse(localStorage.getItem('istanbulDailyRevenue') || '{}');
        let currentFilter = 'all';
        let currentPeriod = 1;
        let secret = localStorage.getItem('admin_secret') || '';
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // DOM Elements
        const loginScreen = document.getElementById('loginScreen');
        const mainPanel = document.getElementById('mainPanel');
        const loginError = document.getElementById('loginError');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionText = document.getElementById('connectionText');
        const ordersList = document.getElementById('ordersList');
        const toastContainer = document.getElementById('toastContainer');
        const notificationSound = document.getElementById('notificationSound');

        // Check if already logged in
        if (secret) {
            loginScreen.style.display = 'none';
            mainPanel.style.display = 'block';
            connectWebSocket();
        }

        // Login function
        function login() {
            const inputSecret = document.getElementById('secretInput').value;
            
            if (!inputSecret) {
                loginError.textContent = 'Şifrə daxil edin';
                return;
            }
            
            fetch('/api/admin/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: inputSecret })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    secret = inputSecret;
                    localStorage.setItem('admin_secret', secret);
                    loginScreen.style.display = 'none';
                    mainPanel.style.display = 'block';
                    connectWebSocket();
                } else {
                    loginError.textContent = 'Səhv şifrə';
                }
            })
            .catch(() => {
                loginError.textContent = 'Serverə qoşulmaq mümkün olmadı';
            });
        }

        function logout() {
            localStorage.removeItem('admin_secret');
            secret = '';
            if (ws) ws.close();
            loginScreen.style.display = 'flex';
            mainPanel.style.display = 'none';
            document.getElementById('secretInput').value = '';
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('✅ WebSocket bağlandı');
                connectionStatus.classList.remove('disconnected');
                connectionText.textContent = 'Online';
                reconnectAttempts = 0;
                
                ws.send(JSON.stringify({ type: 'REGISTER_ADMIN', secret }));
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (error) {}
            };
            
            ws.onclose = () => {
                connectionStatus.classList.add('disconnected');
                connectionText.textContent = 'Offline';
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connectWebSocket, 3000);
                }
            };
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'ADMIN_REGISTERED':
                    if (data.orders) {
                        orders = data.orders;
                        renderOrders();
                        updateStats();
                        updateRevenueDisplay();
                    }
                    showNotification('Admin Panelə Xoş Gəldiniz', 'Bağlantı uğurla quruldu', 'success');
                    break;
                    
                case 'NEW_ORDER':
                    const newOrder = data.order;
                    orders.unshift(newOrder);
                    saveOrderToRevenue(newOrder);
                    renderOrders();
                    updateStats();
                    updateRevenueDisplay();
                    
                    if (data.notification?.sound) {
                        notificationSound.currentTime = 0;
                        notificationSound.play().catch(() => {});
                    }
                    
                    showNotification('🛎️ Yeni Sifariş!', data.notification?.body || 'Yeni sifariş gəldi', 'new-order');
                    break;
                    
                case 'ORDER_UPDATED':
                    const updatedOrder = data.order;
                    const index = orders.findIndex(o => o.id === updatedOrder.id);
                    if (index !== -1) {
                        orders[index] = updatedOrder;
                        renderOrders();
                        updateStats();
                    }
                    break;
            }
        }

        // Gəliri localStorage-a saxla
        function saveOrderToRevenue(order) {
            const date = new Date(order.timestamp).toISOString().split('T')[0];
            const hour = new Date(order.timestamp).getHours();
            
            // Yalnız 09:00-21:00 arası sifarişləri qeyd et
            if (hour < 9 || hour >= 21) return;
            
            if (!dailyRevenue[date]) {
                dailyRevenue[date] = { total: 0, table: 0, delivery: 0, tableCount: 0, deliveryCount: 0 };
            }
            
            dailyRevenue[date].total += order.total || 0;
            if (order.orderType === 'table' || order.table) {
                dailyRevenue[date].table += order.total || 0;
                dailyRevenue[date].tableCount++;
            } else {
                dailyRevenue[date].delivery += order.total || 0;
                dailyRevenue[date].deliveryCount++;
            }
            
            localStorage.setItem('istanbulDailyRevenue', JSON.stringify(dailyRevenue));
        }

        // Sifarişi sil
        function deleteOrder(orderId) {
            if (!confirm('Bu sifarişi silmək istədiyinizə əminsiniz?')) return;
            
            const order = orders.find(o => o.id === orderId);
            if (order) {
                // Gəlirdən çıxartma (istəyə bağlı - gəlir qalsın deyə comment)
                // removeOrderFromRevenue(order);
            }
            
            orders = orders.filter(o => o.id !== orderId);
            renderOrders();
            updateStats();
            showNotification('Sifariş Silindi', `#${orderId} nömrəli sifariş silindi`, 'info');
        }

        // Bütün sifarişləri sil
        function clearAllOrders() {
            if (!confirm('BÜTÜN sifarişləri silmək istədiyinizə əminsiniz? Gəlir məlumatları qalacaq.')) return;
            
            orders = [];
            renderOrders();
            updateStats();
            showNotification('Sifarişlər Silindi', 'Bütün sifarişlər təmizləndi', 'success');
        }

        // Gəlir hesabatı
        function calculateRevenue(period) {
            const dates = [];
            for (let i = 0; i < period; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]);
            }
            
            let total = 0, table = 0, delivery = 0, tableCount = 0, deliveryCount = 0;
            
            dates.forEach(date => {
                if (dailyRevenue[date]) {
                    total += dailyRevenue[date].total || 0;
                    table += dailyRevenue[date].table || 0;
                    delivery += dailyRevenue[date].delivery || 0;
                    tableCount += dailyRevenue[date].tableCount || 0;
                    deliveryCount += dailyRevenue[date].deliveryCount || 0;
                }
            });
            
            return { total, table, delivery, tableCount, deliveryCount };
        }

        function updateRevenueDisplay() {
            const rev = calculateRevenue(currentPeriod);
            document.getElementById('totalRevenue').textContent = `${rev.total.toFixed(2)} ₼`;
            document.getElementById('tableRevenue').textContent = `${rev.table.toFixed(2)} ₼`;
            document.getElementById('deliveryRevenue').textContent = `${rev.delivery.toFixed(2)} ₼`;
            document.getElementById('tableOrderCount').textContent = rev.tableCount;
            document.getElementById('deliveryOrderCount').textContent = rev.deliveryCount;
        }

        function changePeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (i === 0 && period === 1) || (i === 1 && period === 3) || (i === 2 && period === 7));
            });
            updateRevenueDisplay();
        }

        function filterOrders(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(getFilterName(filter))) btn.classList.add('active');
            });
            renderOrders();
        }

        function getFilterName(filter) {
            const names = { all: 'Hamısı', pending: 'Gözləyən', preparing: 'Hazırlanan', ready: 'Hazır' };
            return names[filter] || 'Hamısı';
        }

        function updateOrderStatus(orderId, status) {
            ws.send(JSON.stringify({ type: 'UPDATE_ORDER_STATUS', orderId, status }));
            showNotification('Status Yeniləndi', `Sifariş statusu: ${status}`, 'success');
        }

        function renderOrders() {
            let filteredOrders = orders.filter(o => currentFilter === 'all' || o.status === currentFilter);
            
            if (filteredOrders.length === 0) {
                ordersList.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h3>Sifariş yoxdur</h3></div>`;
                return;
            }
            
            ordersList.innerHTML = filteredOrders.map(order => {
                const statusClass = `status-${order.status}`;
                const statusText = { pending: 'Gözləyir', preparing: 'Hazırlanır', ready: 'Hazırdır', delivered: 'Çatdırıldı', completed: 'Tamamlandı', cancelled: 'Ləğv edildi' }[order.status] || order.status;
                const time = new Date(order.timestamp).toLocaleTimeString('az-AZ', { hour: '2-digit', minute: '2-digit' });
                const isTable = order.table || order.orderType === 'table';
                
                return `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">#${order.id}</span>
                            <span class="order-time"><i class="far fa-clock"></i> ${time}</span>
                        </div>
                        
                        <div class="order-info">
                            <div class="order-info-item">
                                <span class="order-info-label">Tip</span>
                                <span class="order-info-value">
                                    <span class="order-type-badge ${isTable ? 'type-table' : 'type-delivery'}">
                                        ${isTable ? `Masa ${order.table || '—'}` : 'Çatdırılma'}
                                    </span>
                                </span>
                            </div>
                            <div class="order-info-item">
                                <span class="order-info-label">Müştəri</span>
                                <span class="order-info-value">${order.customer?.name || 'Anonim'}</span>
                            </div>
                            ${!isTable && order.address ? `
                                <div class="order-info-item">
                                    <span class="order-info-label">Ünvan</span>
                                    <span class="order-info-value">${order.address.substring(0, 30)}...</span>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <span>${item.quantity}x ${item.name}</span>
                                    <span>${(item.price * item.quantity).toFixed(2)} ₼</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="order-total">Ümumi: ${order.total?.toFixed(2) || '0.00'} ₼</div>
                        
                        <div class="order-actions">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            <select class="status-select" onchange="updateOrderStatus('${order.id}', this.value)">
                                <option value="">Status</option>
                                <option value="pending">Gözləyir</option>
                                <option value="preparing">Hazırlanır</option>
                                <option value="ready">Hazırdır</option>
                                <option value="delivered">Çatdırıldı</option>
                                <option value="completed">Tamamlandı</option>
                            </select>
                            <button class="delete-order-btn" onclick="deleteOrder('${order.id}')">
                                <i class="fas fa-trash"></i> Sil
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('pendingCount').textContent = orders.filter(o => o.status === 'pending').length;
            document.getElementById('preparingCount').textContent = orders.filter(o => o.status === 'preparing').length;
            document.getElementById('readyCount').textContent = orders.filter(o => o.status === 'ready').length;
            document.getElementById('todayOrders').textContent = orders.filter(o => o.timestamp?.startsWith(today)).length;
            document.getElementById('totalOrders').textContent = orders.length;
        }

        function showNotification(title, body, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            const icon = type === 'new-order' ? '🛎️' : type === 'success' ? '✅' : type === 'error' ? '❌' : '🔔';
            
            toast.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-body">${body}</div></div>`;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // Global functions
        window.login = login;
        window.logout = logout;
        window.filterOrders = filterOrders;
        window.updateOrderStatus = updateOrderStatus;
        window.deleteOrder = deleteOrder;
        window.clearAllOrders = clearAllOrders;
        window.changePeriod = changePeriod;

        document.getElementById('secretInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        console.log('🍽️ İstanbul Kafe Admin Panel - Yeni Versiya');
    </script>
</body>
</html>
